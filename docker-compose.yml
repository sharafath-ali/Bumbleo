services:

  # ── Next.js Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bumbleo-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - NEXT_PUBLIC_WS_URL=ws://localhost:8080/ws
      - NEXT_PUBLIC_TURN_URL=${TURN_URLS}
      - NEXT_PUBLIC_TURN_USERNAME=${TURN_USERNAME}
      - NEXT_PUBLIC_TURN_CREDENTIAL=${TURN_PASSWORD}
    depends_on:
      - backend
    networks:
      - bumbleo-net

  # ── Go Signaling Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bumbleo-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - ENV=production
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=bumbleo
      - REDIS_ADDR=redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_EXPIRY=15m
      - JWT_REFRESH_EXPIRY=168h
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - FRONTEND_URL=http://localhost:3000
      - APP_NAME=Bumbleo
      - TURN_USERNAME=${TURN_USERNAME}
      - TURN_PASSWORD=${TURN_PASSWORD}
      - TURN_URLS=${TURN_URLS}
    depends_on:
      - mongodb
      - redis
    networks:
      - bumbleo-net

  # ── MongoDB ───────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: bumbleo-mongodb
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - bumbleo-net

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: bumbleo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save 60 1000 --loglevel warning
    volumes:
      - redis-data:/data
    networks:
      - bumbleo-net

  # ── Coturn (STUN/TURN) ────────────────────────────────────────────────────────
  # NOTE: coturn requires network_mode:host which only works on Linux.
  # On Windows/Mac Docker Desktop, run coturn natively or use a hosted TURN service.
  # coturn:
  #   image: coturn/coturn:latest
  #   container_name: bumbleo-coturn
  #   restart: unless-stopped
  #   network_mode: host
  #   volumes:
  #     - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
  #   command: -c /etc/coturn/turnserver.conf

volumes:
  mongo-data:
  redis-data:

networks:
  bumbleo-net:
    driver: bridge
