# ─── Server ──────────────────────────────────────────────────────────────────
listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0

# ─── Auth ─────────────────────────────────────────────────────────────────────
user=bumbleo:bumbleopass
realm=bumbleo.local
lt-cred-mech

# ─── Relay ────────────────────────────────────────────────────────────────────
min-port=49152
max-port=65535

# ─── Logging ──────────────────────────────────────────────────────────────────
log-file=stdout
no-stdout-log
verbose

# ─── Security ─────────────────────────────────────────────────────────────────
no-dtls
no-tlsv1
no-tlsv1_1
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
